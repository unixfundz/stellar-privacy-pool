services:
  postgres:
    image: postgres:15-alpine
    container_name: stellar-privacy-pool-db
    environment:
      POSTGRES_DB: privacy_pool
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stellar-privacy-pool-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./django-backend
      dockerfile: Dockerfile
    container_name: stellar-privacy-pool-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=privacy_pool
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - STELLAR_NETWORK=testnet
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./django-backend:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  celery:
    build:
      context: ./django-backend
      dockerfile: Dockerfile
    container_name: stellar-privacy-pool-celery
    environment:
      - DEBUG=True
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=privacy_pool
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./django-backend:/app
    command: celery -A privacy_pool worker -l info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stellar-privacy-pool-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data: